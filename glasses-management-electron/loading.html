<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>系统启动中</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a90e2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 10px 0; font-size: 20px; color: #2c3e50; }
        #status { color: #666; font-size: 14px; text-align: center; max-width: 80%; line-height: 1.5; }
        .progress-container {
            width: 60%;
            height: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: #4a90e2;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>视光管理系统</h2>
    <div id="status">正在检查运行环境...</div>
    <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <script>
        // Use Electron IPC to receive status updates
        if (window.electronAPI) {
            window.electronAPI.onUpdateStatus((text, progress) => {
                document.getElementById('status').innerText = text;
                if (progress !== undefined) {
                    const pct = Math.round(progress * 100);
                    const container = document.getElementById('progress-container');
                    const bar = document.getElementById('progress-bar');
                    container.style.display = 'block';
                    bar.style.width = pct + '%';
                }
            });
        }
    </script>
</body>
</html>
