# 生产环境配置 (打包成 EXE 时自动激活)
# 数据库路径使用安装目录的 data 子目录（通过 JVM 参数 app.home 传入）
# 若 app.home 未设置则回退到用户主目录
spring:
  datasource:
    url: jdbc:h2:file:${user.home}/.glasses_management/data/glasses_management;MODE=MySQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
  h2:
    console:
      enabled: false

logging:
  file:
    path: ${app.home:${user.home}/.glasses_management}/logs
  level:
    root: INFO
