server:
  port: ${SERVER_PORT:8080}

app:
  invite-code: ${APP_INVITE_CODE}

glasses:
  admin:
    username: ${GLASSES_ADMIN_USERNAME:admin}
    password: ${GLASSES_ADMIN_PASSWORD}
    real-name: ${GLASSES_ADMIN_REAL_NAME:系统管理员}
    enabled: ${GLASSES_ADMIN_ENABLED:true}

spring:
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./app/application-local.yml
      - optional:file:${user.home}/.glasses_management/application-local.yml
      - optional:file:${user.home}/.glasses_management_mysql/application-local.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.h2.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/glasses_management;MODE=MySQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
