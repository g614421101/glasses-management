server:
  port: 8080

app:
  invite-code: REMOVED_INVITE_CODE

glasses:
  admin:
    username: admin
    password: "REMOVED_ADMIN_PASSWORD"
    real-name: "系统管理员"
    enabled: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: REMOVED_MYSQL_JDBC_URL
    username: REMOVED_MYSQL_USERNAME
    password: "REMOVED_MYSQL_PASSWORD"
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
