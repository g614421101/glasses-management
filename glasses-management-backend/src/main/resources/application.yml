server:
  port: ${SERVER_PORT:8080}

app:
  invite-code: ${APP_INVITE_CODE}

glasses:
  admin:
    username: ${GLASSES_ADMIN_USERNAME:admin}
    password: ${GLASSES_ADMIN_PASSWORD}
    real-name: ${GLASSES_ADMIN_REAL_NAME:系统管理员}
    enabled: ${GLASSES_ADMIN_ENABLED:true}
  mdns:
    enabled: true
    service-name: GlassesManagement

spring:
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./app/application-local.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
